vars:
- configs/default.yaml

stages:
  # ── Stage 0: Generate Synthetic Benign (one stage per category — costs API tokens) ─────
  generate_synthetic_benign:
    foreach:
    - A
    - B
    - C
    - D
    - E
    - F
    do:
      cmd: python -m src.cli.generate_synthetic_benign --category ${item}
      deps:
      - src/cli/generate_synthetic_benign.py
      - src/synthetic_benign.py
      - src/validators.py
      - src/utils.py
      params:
      - configs/default.yaml:
        - benign.synthetic
        - llm
      outs:
      - data/processed/synthetic_benign/synthetic_benign_${item}.parquet

  # ── Stage 1: Preprocess ──────────────────────────────────────────────────
  preprocess:
    cmd: python -m src.preprocess
    deps:
    - src/preprocess.py
    - src/utils.py
    - data/processed/synthetic_benign/
    params:
    - configs/default.yaml:
      - dataset
      - labels
      - benign
      - training_datasets
    outs:
    - data/processed/full_dataset.parquet

  # ── Stage 2: Build Splits ────────────────────────────────────────────────
  build_splits:
    cmd: python -m src.build_splits
    deps:
    - src/build_splits.py
    - src/utils.py
    - data/processed/full_dataset.parquet
    params:
    - configs/default.yaml:
      - splits
      - labels.held_out_attacks
      - training_datasets
    outs:
    - data/processed/splits/train.parquet
    - data/processed/splits/val.parquet
    - data/processed/splits/test.parquet
    - data/processed/splits/unseen_val.parquet
    - data/processed/splits/unseen_test.parquet
    - data/processed/splits/safeguard_test.parquet

  # ── Stage 3: ML Model (train + research predictions) ─────────────────────
  ml_model:
    cmd: python -m src.ml_classifier.ml_baseline --research --no-wandb
    deps:
    - src/ml_classifier/
    - src/utils.py
    - data/processed/splits/train.parquet
    - data/processed/splits/val.parquet
    - data/processed/splits/test.parquet
    - data/processed/splits/unseen_val.parquet
    - data/processed/splits/unseen_test.parquet
    - data/processed/splits/safeguard_test.parquet
    params:
    - configs/default.yaml:
      - ml
    outs:
    - data/processed/models/ml_baseline.pkl
    - data/processed/predictions/ml_predictions_test.parquet
    - data/processed/predictions/ml_predictions_val.parquet
    - data/processed/predictions/ml_predictions_unseen_val.parquet
    - data/processed/predictions/ml_predictions_unseen_test.parquet
    - data/processed/predictions/ml_predictions_safeguard_test.parquet

  # ── Stage 3b: DeBERTa Classifier (train + research predictions) ─────────
  deberta_model:
    cmd: python -m src.cli.deberta_classifier --research
    deps:
    - src/models/
    - src/cli/deberta_classifier.py
    - src/utils.py
    - data/processed/splits/train.parquet
    - data/processed/splits/val.parquet
    - data/processed/splits/test.parquet
    - data/processed/splits/unseen_val.parquet
    - data/processed/splits/unseen_test.parquet
    - data/processed/splits/safeguard_test.parquet
    params:
    - configs/default.yaml:
      - deberta
    outs:
    - artifacts/deberta_classifier/model/
    - artifacts/deberta_classifier/tokenizer/
    - artifacts/deberta_classifier/label_mapping.json
    - artifacts/deberta_classifier/train_history.json
    - data/processed/predictions/deberta_predictions_test.parquet
    - data/processed/predictions/deberta_predictions_val.parquet
    - data/processed/predictions/deberta_predictions_unseen_val.parquet
    - data/processed/predictions/deberta_predictions_unseen_test.parquet
    - data/processed/predictions/deberta_predictions_safeguard_test.parquet
    - reports/deberta_classifier/metrics.json:
        cache: false
    - reports/deberta_classifier/classification_report.json:
        cache: false
    - reports/deberta_classifier/summary.md:
        cache: false

  # ── Stage 3c: DeBERTa External Predictions (one stage per external dataset) ─
  deberta_external:
    foreach: ${external_datasets}
    do:
      cmd: python -m src.cli.eval_deberta_external --dataset ${key}
      deps:
      - src/cli/eval_deberta_external.py
      - src/external_datasets.py
      - src/models/
      - src/utils.py
      - artifacts/deberta_classifier/model/
      - artifacts/deberta_classifier/tokenizer/
      - artifacts/deberta_classifier/label_mapping.json
      params:
      - configs/default.yaml:
        - external_datasets.${key}
        - deberta
      outs:
      - data/processed/predictions_external/deberta_predictions_external_${key}.parquet
      - reports/research_external/eval_deberta_external_${key}.md:
          cache: false

  # ── Stage 4c: Judge Colab Local Classifier Outputs ────────────────────
  # `unseen_val` is intentionally omitted: it is the threshold-selection
  # split for `train_escalating_model` and its judged output is not consumed
  # by `final_verdict_report` or any downstream stage.
  judge_colab_local_predictions:
    foreach:
    - test
    - unseen_test
    - safeguard_test
    do:
      cmd: python -m src.cli.judge_colab_local_predictions --split ${item} --max-concurrency
        1 --target-rpm 2 --cooldown-on-429 60
      deps:
      - data/processed/predictions/llm_predictions_${item}_colab_local_classifier.parquet
      - data/processed/research/escalating_model_eval_${item}.parquet
      - src/cli/judge_colab_local_predictions.py
      - src/llm_classifier/
      - src/utils.py
      params:
      - configs/default.yaml:
        - llm
        - hybrid.escalating_model
      outs:
      - data/processed/predictions/llm_predictions_${item}_colab_local_judged.parquet

  validate_colab_handoff:
    cmd: python -m src.cli.validate_colab_handoff --config configs/default.yaml
    deps:
    - src/cli/validate_colab_handoff.py
    - src/cli/colab_handoff_schema.py
    - data/processed/predictions/llm_predictions_val_colab_local_classifier.parquet
    - data/processed/predictions/deberta_predictions_val.parquet
    - data/processed/predictions/llm_predictions_test_colab_local_classifier.parquet
    - data/processed/predictions/deberta_predictions_test.parquet
    - data/processed/predictions/llm_predictions_unseen_val_colab_local_classifier.parquet
    - data/processed/predictions/deberta_predictions_unseen_val.parquet
    - data/processed/predictions/llm_predictions_unseen_test_colab_local_classifier.parquet
    - data/processed/predictions/deberta_predictions_unseen_test.parquet
    - data/processed/predictions/llm_predictions_safeguard_test_colab_local_classifier.parquet
    - data/processed/predictions/deberta_predictions_safeguard_test.parquet
    - data/processed/predictions_external/llm_predictions_external_deepset.parquet
    - data/processed/predictions_external/deberta_predictions_external_deepset.parquet
    - data/processed/predictions_external/llm_predictions_external_jackhhao.parquet
    - data/processed/predictions_external/deberta_predictions_external_jackhhao.parquet
    params:
    - configs/default.yaml:
      - external_datasets
    outs:
    - reports/colab_handoff_validation.json:
        cache: false

  # ── Stage 5c2: Train Canonical Escalating Model ─────────────────────────
  train_escalating_model:
    cmd: python -m src.cli.train_escalating_model
    deps:
    - src/logprob_margin.py
    - src/escalating_model.py
    - src/cli/train_escalating_model.py
    - reports/colab_handoff_validation.json
    - data/processed/predictions/llm_predictions_val_colab_local_classifier.parquet
    - data/processed/predictions/deberta_predictions_val.parquet
    - data/processed/predictions/llm_predictions_test_colab_local_classifier.parquet
    - data/processed/predictions/deberta_predictions_test.parquet
    - data/processed/predictions/llm_predictions_unseen_val_colab_local_classifier.parquet
    - data/processed/predictions/deberta_predictions_unseen_val.parquet
    - data/processed/predictions/llm_predictions_unseen_test_colab_local_classifier.parquet
    - data/processed/predictions/deberta_predictions_unseen_test.parquet
    - data/processed/predictions/llm_predictions_safeguard_test_colab_local_classifier.parquet
    - data/processed/predictions/deberta_predictions_safeguard_test.parquet
    - data/processed/predictions_external/llm_predictions_external_deepset.parquet
    - data/processed/predictions_external/deberta_predictions_external_deepset.parquet
    - data/processed/predictions_external/llm_predictions_external_jackhhao.parquet
    - data/processed/predictions_external/deberta_predictions_external_jackhhao.parquet
    params:
    - configs/default.yaml:
      - hybrid.escalating_model
      - external_datasets
    outs:
    - data/processed/models/escalating_model.pkl
    - data/processed/research/escalating_model_eval_test.parquet
    - data/processed/research/escalating_model_eval_unseen_val.parquet
    - data/processed/research/escalating_model_eval_unseen_test.parquet
    - data/processed/research/escalating_model_eval_safeguard_test.parquet
    - data/processed/research/escalating_model_eval_external_deepset.parquet
    - data/processed/research/escalating_model_eval_external_jackhhao.parquet
    - data/processed/research/escalating_model_summary.csv
    - data/processed/research/escalating_model_unseen_val_postscore_split_map.csv
    - data/processed/research/escalating_model_threshold_sweep_unseen_val.csv
    - reports/escalating_model_poc.md:
        cache: false

  # ── Stage 5c3: Judge External Colab Local Classifier Outputs ────────────
  judge_colab_local_predictions_external:
    foreach: ${external_datasets}
    do:
      cmd: python -m src.cli.judge_colab_local_predictions --split external_${key}
        --input data/processed/predictions_external/llm_predictions_external_${key}.parquet
        --output data/processed/predictions_external/llm_predictions_external_${key}_colab_local_judged.parquet
        --escalation-scores data/processed/research/escalating_model_eval_external_${key}.parquet
        --max-concurrency 1 --target-rpm 2 --cooldown-on-429 60
      deps:
      - data/processed/predictions_external/llm_predictions_external_${key}.parquet
      - data/processed/research/escalating_model_eval_external_${key}.parquet
      - src/cli/judge_colab_local_predictions.py
      - src/llm_classifier/
      - src/utils.py
      params:
      - configs/default.yaml:
        - llm
        - hybrid.escalating_model
        - external_datasets.${key}
      outs:
      - data/processed/predictions_external/llm_predictions_external_${key}_colab_local_judged.parquet

  # ── Stage 8: Canonical Final-Verdict Evaluation Report ──────────────────
  final_verdict_report:
    cmd: python -m src.cli.final_verdict_report --config configs/default.yaml
    deps:
    - src/cli/final_verdict_report.py
    - src/evaluate.py
    - src/utils.py
    - data/processed/predictions/llm_predictions_test_colab_local_judged.parquet
    - data/processed/predictions/llm_predictions_unseen_test_colab_local_judged.parquet
    - data/processed/predictions/llm_predictions_safeguard_test_colab_local_judged.parquet
    - data/processed/predictions_external/llm_predictions_external_deepset_colab_local_judged.parquet
    - data/processed/predictions_external/llm_predictions_external_jackhhao_colab_local_judged.parquet
    - data/processed/models/escalating_model.pkl
    - data/processed/research/escalating_model_summary.csv
    - data/processed/research/escalating_model_eval_external_deepset.parquet
    - data/processed/research/escalating_model_eval_external_jackhhao.parquet
    - reports/colab_handoff_validation.json
    params:
    - configs/default.yaml:
      - hybrid.escalating_model
      - external_datasets
    outs:
    - reports/pipeline_final_verdict_report.md:
        cache: false
