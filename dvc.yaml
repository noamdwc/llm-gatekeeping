vars:
- configs/default.yaml

stages:
  # ── Stage 0: Generate Synthetic Benign (one stage per category — costs API tokens) ─────
  generate_synthetic_benign:
    foreach:
    # - A
    - B
    - C
    - D
    - E
    - F
    do:
      cmd: python -m src.cli.generate_synthetic_benign --category ${item}
      deps:
      - src/cli/generate_synthetic_benign.py
      - src/synthetic_benign.py
      - src/validators.py
      - src/utils.py
      params:
      - configs/default.yaml:
        - benign.synthetic
        - llm
      outs:
      - data/processed/synthetic_benign/synthetic_benign_${item}.parquet

  # ── Stage 1: Preprocess ──────────────────────────────────────────────────
  preprocess:
    cmd: python -m src.preprocess
    deps:
    - src/preprocess.py
    - src/utils.py
    - data/processed/synthetic_benign/
    params:
    - configs/default.yaml:
      - dataset
      - labels
      - benign
      - training_datasets
    outs:
    - data/processed/full_dataset.parquet

  # ── Stage 2: Build Splits ────────────────────────────────────────────────
  build_splits:
    cmd: python -m src.build_splits
    deps:
    - src/build_splits.py
    - src/utils.py
    - data/processed/full_dataset.parquet
    params:
    - configs/default.yaml:
      - splits
      - labels.held_out_attacks
      - training_datasets
    outs:
    - data/processed/splits/train.parquet
    - data/processed/splits/val.parquet
    - data/processed/splits/test.parquet
    - data/processed/splits/unseen_val.parquet
    - data/processed/splits/unseen_test.parquet
    - data/processed/splits/safeguard_test.parquet

  # ── Stage 3: ML Model (train + research predictions) ─────────────────────
  ml_model:
    cmd: python -m src.ml_classifier.ml_baseline --research --no-wandb
    deps:
    - src/ml_classifier/
    - src/utils.py
    - data/processed/splits/train.parquet
    - data/processed/splits/val.parquet
    - data/processed/splits/test.parquet
    - data/processed/splits/unseen_val.parquet
    - data/processed/splits/unseen_test.parquet
    - data/processed/splits/safeguard_test.parquet
    params:
    - configs/default.yaml:
      - ml
    outs:
    - data/processed/models/ml_baseline.pkl
    - data/processed/predictions/ml_predictions_test.parquet
    - data/processed/predictions/ml_predictions_val.parquet
    - data/processed/predictions/ml_predictions_unseen_val.parquet
    - data/processed/predictions/ml_predictions_unseen_test.parquet
    - data/processed/predictions/ml_predictions_safeguard_test.parquet

  # ── Stage 3b: DeBERTa Classifier (train + research predictions) ─────────
  deberta_model:
    cmd: python -m src.cli.deberta_classifier --research
    deps:
    - src/models/
    - src/cli/deberta_classifier.py
    - src/utils.py
    - data/processed/splits/train.parquet
    - data/processed/splits/val.parquet
    - data/processed/splits/test.parquet
    - data/processed/splits/unseen_val.parquet
    - data/processed/splits/unseen_test.parquet
    - data/processed/splits/safeguard_test.parquet
    params:
    - configs/default.yaml:
      - deberta
    outs:
    - artifacts/deberta_classifier/model/
    - artifacts/deberta_classifier/tokenizer/
    - artifacts/deberta_classifier/label_mapping.json
    - artifacts/deberta_classifier/train_history.json
    - data/processed/predictions/deberta_predictions_test.parquet
    - data/processed/predictions/deberta_predictions_val.parquet
    - data/processed/predictions/deberta_predictions_unseen_val.parquet
    - data/processed/predictions/deberta_predictions_unseen_test.parquet
    - data/processed/predictions/deberta_predictions_safeguard_test.parquet
    - reports/deberta_classifier/metrics.json:
        cache: false
    - reports/deberta_classifier/classification_report.json:
        cache: false
    - reports/deberta_classifier/summary.md:
        cache: false

  # ── Stage 4: LLM Classifier ─────────────────────────────────────────────
  llm_classifier:
    cmd: python -m src.llm_classifier.llm_classifier --split test --research --no-wandb
    deps:
    - data/processed/splits/test.parquet
    - data/processed/splits/train.parquet
    - src/embeddings.py
    - src/llm_classifier/
    - src/utils.py
    params:
    - configs/default.yaml:
      - llm
    outs:
    - data/processed/predictions/llm_predictions_test.parquet

  # ── Stage 4b: LLM Classifier on val ────────────────────────────────────
  llm_classifier_val:
    cmd: python -m src.llm_classifier.llm_classifier --split val --research --no-wandb
    deps:
    - data/processed/splits/train.parquet
    - data/processed/splits/val.parquet
    - src/embeddings.py
    - src/llm_classifier/
    - src/utils.py
    params:
    - configs/default.yaml:
      - llm
    outs:
    - data/processed/predictions/llm_predictions_val.parquet

  # ── Stage 5: Research (merge predictions + hybrid routing + reports) ─────
  research:
    cmd: python -m src.research --split test
    deps:
    - src/research.py
    - src/benign_risk_model.py
    - src/hybrid_router.py
    - src/evaluate.py
    - src/utils.py
    - data/processed/predictions/
    - data/processed/splits/test.parquet
    - data/processed/models/risk_model.pkl
    params:
    - configs/default.yaml:
      - hybrid
    outs:
    - data/processed/research/research_test.parquet
    - data/processed/research/hybrid_margin_trace_test.parquet

  # ── Stage 5b: Research on val ──────────────────────────────────────────
  research_val:
    cmd: python -m src.research --split val
    deps:
    - data/processed/predictions/
    - data/processed/splits/val.parquet
    - src/evaluate.py
    - src/hybrid_router.py
    - src/research.py
    - src/utils.py
    params:
    - configs/default.yaml:
      - hybrid
    outs:
    - data/processed/research/hybrid_margin_trace_val.parquet
    - data/processed/research/research_val.parquet

  # ── Stage 5d: Research on safeguard_test (binary-only) ──────────────────
  research_safeguard_test:
    cmd: python -m src.research --split safeguard_test
    deps:
    - data/processed/predictions/
    - data/processed/splits/safeguard_test.parquet
    - src/evaluate.py
    - src/hybrid_router.py
    - src/research.py
    - src/utils.py
    params:
    - configs/default.yaml:
      - hybrid
    outs:
    - data/processed/research/research_safeguard_test.parquet

  # ── Stage 5c: Train Risk Model (on val trace + DeBERTa) ─────────────────
  train_risk_model:
    cmd: python -m src.cli.train_risk_model
    deps:
    - src/benign_risk_model.py
    - src/cli/train_risk_model.py
    - data/processed/research/hybrid_margin_trace_val.parquet
    - data/processed/predictions/deberta_predictions_val.parquet
    params:
    - configs/default.yaml:
      - hybrid.risk_model
    outs:
    - data/processed/models/risk_model.pkl

  # ── Stage 6: External LLM Predictions (one stage per dataset) ────────────
  research_external_llm:
    foreach: ${external_datasets}
    do:
      cmd: python -m src.cli.research_external --dataset ${key} --mode llm --llm-predictions-path
        data/processed/predictions_external/llm_predictions_external_${key}.parquet
      deps:
      - src/cli/research_external.py
      - src/eval_external.py
      - src/embeddings.py
      - src/llm_classifier/
      - src/utils.py
      - data/processed/splits/train.parquet
      params:
      - configs/default.yaml:
        - external_datasets.${key}
        - llm
      outs:
      - data/processed/predictions_external/llm_predictions_external_${key}.parquet

  # ── Stage 7: External Dataset Research (strict hybrid; one stage per dataset) ───────────
  research_external:
    foreach: ${external_datasets}
    do:
      cmd: python -m src.cli.research_external --dataset ${key} --mode hybrid --llm-predictions-path
        data/processed/predictions_external/llm_predictions_external_${key}.parquet
      deps:
      - src/cli/research_external.py
      - src/eval_external.py
      - src/ml_classifier/
      - src/embeddings.py
      - src/llm_classifier/
      - src/utils.py
      - data/processed/models/ml_baseline.pkl
      - data/processed/splits/train.parquet
      - data/processed/predictions_external/llm_predictions_external_${key}.parquet
      params:
      - configs/default.yaml:
        - external_datasets.${key}
        - hybrid.ml_confidence_threshold
      outs:
      - data/processed/research_external/research_external_${key}.parquet

  # ── Stage 7b: Post-hoc Benign Risk Model ──────────────────────────────────
  risk_model:
    cmd: python -m src.cli.benign_risk_model --train-trace data/processed/research/hybrid_margin_trace_val.parquet
      --trace data/processed/research/hybrid_margin_trace_test.parquet --split test
    deps:
    - src/benign_risk_model.py
    - src/cli/benign_risk_model.py
    - data/processed/research/hybrid_margin_trace_val.parquet
    - data/processed/research/hybrid_margin_trace_test.parquet
    outs:
    - data/processed/research/posthoc_benign_risk_predictions.parquet
    - data/processed/research/posthoc_benign_risk_summary.csv
    - reports/posthoc_benign_risk_model.md:
        cache: false
    - reports/artifacts/benign_risk_roc.png:
        cache: false
    - reports/artifacts/benign_risk_pr.png:
        cache: false
    - reports/artifacts/benign_risk_calibration.png:
        cache: false

  # ── Stage 8: Eval Reports (post-router-patch evaluation markdowns) ───────
  eval_new:
    cmd: python -m src.cli.eval_new --split test --config configs/default.yaml --only-main
    deps:
    - src/cli/eval_new.py
    - src/cli/eval_baselines.py
    - src/baselines/threshold.py
    - src/research.py
    - src/evaluate.py
    - src/utils.py
    - data/processed/research/research_test.parquet
    - data/processed/research/posthoc_benign_risk_summary.csv
    - data/processed/research_external/
    params:
    - configs/default.yaml:
      - llm
      - external_datasets
    outs:
    - reports/research/eval_report_ml.md:
        cache: false
    - reports/research/eval_report_llm.md:
        cache: false
    - reports/research/eval_report_hybrid.md:
        cache: false
    - reports/research/summary_report.md:
        cache: false

  # ── Stage 9: External Eval Reports (dynamic foreach from config) ─────────
  eval_new_external:
    foreach: ${external_datasets}
    do:
      cmd: python -m src.cli.eval_new --config configs/default.yaml --only-external
        --dataset ${key}
      deps:
      - src/cli/eval_new.py
      - src/cli/research_external.py
      - src/evaluate.py
      - src/utils.py
      - data/processed/research_external/research_external_${key}.parquet
      params:
      - configs/default.yaml:
        - external_datasets.${key}
        - hybrid.ml_confidence_threshold
      outs:
      - reports/research_external/research_external_${key}.md:
          cache: false
