# LLM Security Gatekeeper — Default Configuration

dataset:
  name: "Mindgard/evaded-prompt-injection-and-jailbreak-samples"
  split: "train"
  text_col: "modified_sample"
  original_text_col: "original_sample"
  label_col: "attack_name"

# Hierarchical label scheme
labels:
  unicode_attacks:
    - Diacritcs
    - Underline Accent Marks
    - Upside Down Text
    - Bidirectional Text
    - Full Width Text
    - Emoji Smuggling
    - Spaces
    - Homoglyphs
    - Deletion Characters
    - Unicode Tags Smuggling
    - Zero Width
    - Numbers

  nlp_attacks:
    - BAE
    - Bert-Attack
    - Deep Word Bug
    - Alzantot
    - Pruthi
    - PWWS
    - TextBugger
    - TextFooler

  # Attack types held out entirely for unseen-attack generalization testing
  held_out_attacks:
    - Emoji Smuggling
    - Pruthi

# Data splits
splits:
  train: 0.7
  val: 0.15
  test: 0.15
  random_seed: 42

# Benign set construction
benign:
  # Use original_prompt values as seed
  use_originals: true
  # Target count after augmentation (paraphrasing)
  target_count: 2000
  paraphrase_model: "meta/llama-3.1-8b-instruct"
  paraphrases_per_prompt: 2
  # Synthetic benign generation (off by default; run src/cli/generate_synthetic_benign.py first)
  synthetic:
    enabled: true
    generation_model: "meta/llama-3.1-8b-instruct"
    quotas:           # target samples per category
      A: 1000         # General QA / task prompts
      B: 1250         # Instruction-like benigns
      C: 1250         # Security discussion (educational)
      D: 750          # Noisy formatting (JSON, markdown, logs)
      E: 500          # Near-miss counterfactuals (ignore/bypass in benign context)
      F: 250          # Domain-specific professional queries
    batch_size: 20    # prompts per LLM call
    output_path: "data/processed/synthetic_benign.parquet"

# LLM classifier
# Provider: set LLM_PROVIDER env var to "nim" (default) or "openai".
# NIM model names below are auto-translated to OpenAI equivalents when LLM_PROVIDER=openai.
llm:
  model: "meta/llama-3.1-8b-instruct"
  model_quality: "meta/llama-3.1-70b-instruct"
  temperature: 0
  max_concurrency: 8
  checkpoint_every: 200
  resume: true
  max_tokens_classifier: 200
  max_tokens_judge: 500
  judge_confidence_threshold: 0.9
  capture_logprobs: true
  top_logprobs: 5
  few_shot:
    unicode: 2
    nlp: 5
    # Static hard-benign examples (off by default; enable after synthetic generation)
    include_hard_benign: false
    # Dynamic few-shot settings
    embedding_model: "nvidia/nv-embedqa-e5-v5"
    bank_size_per_type: 15
    dynamic_k: 2

# ML baseline
ml:
  char_ngram_range: [2, 5]
  max_features: 50000
  C: 1.0
  solver: "saga"
  max_iter: 8000
  tol: 0.001
  scale_features: true
  hyperparam_search:
    enabled: true
    C_values: [0.01, 0.1, 1.0, 10.0]
    cv_folds: 5
    scoring: "f1_macro"
    n_jobs: -1

# Hybrid router
hybrid:
  ml_confidence_threshold: 0.85
  llm_confidence_threshold: 0.9
  margin_policy: baseline
  # Logprob margin gate: override LLM benign predictions when the label-start
  # token margin (rank-1 vs rank-2 logprob delta, in nats) is below this value.
  # Set to null to disable. Recommended range: 2.0-3.0 nats.
  logprob_margin_threshold: 2.0
  # Optional thresholds for non-baseline policies.
  margin_low_threshold: 1.0
  margin_high_threshold: 2.5
  margin_threshold_classifier_only: 2.5
  margin_threshold_judge: 1.5
  production_adversarial_prior: 0.1

# Evaluation
evaluation:
  calibration_bins: 10

# External datasets for generalization evaluation (binary-only)
external_datasets:
  deepset:
    name: "deepset/prompt-injections"
    split: "test"
    text_col: "text"
    label_col: "label"
    label_map:
      1: "adversarial"
      0: "benign"
  jackhhao:
    name: "jackhhao/jailbreak-classification"
    split: "test"
    text_col: "prompt"
    label_col: "type"
    label_map:
      jailbreak: "adversarial"
      benign: "benign"
  safeguard:
    name: "xTRam1/safe-guard-prompt-injection"
    split: "test"
    text_col: "text"
    label_col: "label"
    label_map:
      1: "adversarial"
      0: "benign"
