          - Upside Down Text
          - Bidirectional Text
          - Full Width Text
          - Emoji Smuggling
          - Spaces
          - Homoglyphs
          - Deletion Characters
          - Unicode Tags Smuggling
          - Zero Width
          - Numbers
          nlp_attacks:
