        benign:
          use_originals: true
          target_count: 2000
          paraphrase_model: meta/llama-3.1-8b-instruct
          paraphrases_per_prompt: 2
          synthetic:
            enabled: true
            generation_model: meta/llama-3.1-8b-instruct
            quotas:
              A: 1000
              B: 1250
              C: 1250
              D: 750
              E: 500
              F: 250
            batch_size: 20
            output_dir: data/processed/synthetic_benign
        dataset:
          name: Mindgard/evaded-prompt-injection-and-jailbreak-samples
          split: train
          text_col: modified_sample
          original_text_col: original_sample
          label_col: attack_name
        labels:
          unicode_attacks:
          - Diacritcs
          - Underline Accent Marks
          - Upside Down Text
          - Bidirectional Text
          - Full Width Text
          - Emoji Smuggling
          - Spaces
          - Homoglyphs
          - Deletion Characters
          - Unicode Tags Smuggling
          - Zero Width
          - Numbers
          nlp_attacks:
          - BAE
          - Bert-Attack
          - Deep Word Bug
          - Alzantot
          - Pruthi
          - PWWS
          - TextBugger
          - TextFooler
          held_out_attacks:
          - Emoji Smuggling
          - Pruthi
    outs:
    - path: data/processed/full_dataset.parquet
      hash: md5
      md5: d8e27150899703a1d25cc4bcb8f77e35
      size: 3330798
  build_splits:
    cmd: python -m src.build_splits
    deps:
    - path: data/processed/full_dataset.parquet
      hash: md5
      md5: 50d953c98d9b6687f693fa82ab320f45
      size: 7221298
