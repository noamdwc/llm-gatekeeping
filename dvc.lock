    - path: src/utils.py
      hash: md5
      md5: aa5d2f6b993e019e3d85b3e13a53f23e
      size: 1843
    params:
      configs/default.yaml:
        labels.held_out_attacks:
        - Emoji Smuggling
        - Pruthi
        - TextFooler
        - BAE
        splits:
          train: 0.7
          val: 0.15
          test: 0.15
          unseen_val_ratio: 0.5
          random_seed: 42
        training_datasets:
          safeguard:
            name: xTRam1/safe-guard-prompt-injection
            train_split: train
            test_split: test
            text_col: text
            label_col: label
            label_map:
              1: adversarial
              0: benign
