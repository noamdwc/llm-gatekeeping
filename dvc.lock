      size: 10563
    - path: src/utils.py
      hash: md5
      md5: c4cdd912809721aa124ebeb78ddb9cbd
      size: 1939
    params:
      configs/default.yaml:
        benign:
          use_originals: true
          target_count: 2000
          paraphrase_model: meta/llama-3.1-8b-instruct
          paraphrases_per_prompt: 2
          synthetic:
            enabled: true
            generation_model: meta/llama-3.1-8b-instruct
            quotas:
              A: 1000
              B: 1250
              C: 1250
              D: 750
              E: 500
              F: 250
            batch_size: 20
            output_dir: data/processed/synthetic_benign
        dataset:
          name: Mindgard/evaded-prompt-injection-and-jailbreak-samples
          split: train
          text_col: modified_sample
          original_text_col: original_sample
          label_col: attack_name
        labels:
          unicode_attacks:
          - Diacritcs
          - Underline Accent Marks
          - Upside Down Text
          - Bidirectional Text
          - Full Width Text
          - Emoji Smuggling
          - Spaces
          - Homoglyphs
          - Deletion Characters
          - Unicode Tags Smuggling
          - Zero Width
          - Numbers
          nlp_attacks:
          - BAE
          - Bert-Attack
          - Deep Word Bug
          - Alzantot
          - Pruthi
          - PWWS
          - TextBugger
          - TextFooler
          held_out_attacks:
          - Emoji Smuggling
          - Pruthi
          - TextFooler
          - BAE
        training_datasets:
          safeguard:
            name: xTRam1/safe-guard-prompt-injection
            train_split: train
            test_split: test
            text_col: text
            label_col: label
            label_map:
              1: adversarial
              0: benign
    outs:
    - path: data/processed/full_dataset.parquet
      hash: md5
      md5: c40efe6b65418af6a4d3bb6934f1e2db
      size: 7214292
  build_splits:
    cmd: python -m src.build_splits
    deps:
    - path: data/processed/full_dataset.parquet
      hash: md5
      md5: c40efe6b65418af6a4d3bb6934f1e2db
      size: 7214292
    - path: src/build_splits.py
      hash: md5
      md5: f322c06c52fc81e198a7f4ef22615d6a
      size: 8226
    - path: src/utils.py
      hash: md5
      md5: c4cdd912809721aa124ebeb78ddb9cbd
      size: 1939
    params:
      configs/default.yaml:
        labels.held_out_attacks:
        - Emoji Smuggling
        - Pruthi
        - TextFooler
        - BAE
        splits:
          train: 0.7
          val: 0.15
          test: 0.15
          unseen_val_ratio: 0.5
          random_seed: 42
        training_datasets:
          safeguard:
            name: xTRam1/safe-guard-prompt-injection
            train_split: train
            test_split: test
            text_col: text
            label_col: label
            label_map:
