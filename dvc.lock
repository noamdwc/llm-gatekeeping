          - Underline Accent Marks
          - Upside Down Text
          - Bidirectional Text
          - Full Width Text
          - Emoji Smuggling
          - Spaces
          - Homoglyphs
          - Deletion Characters
          - Unicode Tags Smuggling
          - Zero Width
          - Numbers
          nlp_attacks:
          - BAE
          - Bert-Attack
          - Deep Word Bug
          - Alzantot
          - Pruthi
          - PWWS
          - TextBugger
          - TextFooler
          held_out_attacks:
          - Emoji Smuggling
          - Pruthi
    outs:
    - path: data/processed/full_dataset.parquet
