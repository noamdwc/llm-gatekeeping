name: llm-gate

channels:
  - conda-forge

dependencies:
  - python=3.11

  # Core data / ML stack
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - scikit-learn>=1.3
  - lightgbm>=4.0
  - pyarrow>=14.0
 
  # Native runtime stability for macOS OpenMP users like LightGBM/sklearn
  - llvm-openmp

  # Project/runtime dependencies
  - datasets>=2.14
  - openai>=1.0
  - pyyaml>=6.0
  - tqdm>=4.65
  - python-dotenv>=1.0
  - wandb>=0.16
  - matplotlib>=3.8
  - dvc>=3.50
  - transformers>=4.36
  - pytorch>=2.1
  - pytorch-lightning>=2.0
  - accelerate>=0.25
  - sentencepiece>=0.1.99
  - tiktoken>=0.7
  # Keep uv available for commands, even if env file owns deps
  - uv
  - pip

  # Dev / CI tools
  - pytest>=8.3,<9
  - pytest-mock
  - black=25.1.0
  - threadpoolctl>=3.6.0

  # Linux-only / pip-only packages
  - pip:
      - vllm>=0.6.0; platform_system == "Linux" and python_version < "3.14"